<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA Video sin Fondo</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
        AFRAME.registerShader('chromakey', {
            schema: {
                src: {type: 'map'},
                color: {type: 'color', default: '#00ff00'},
                similarity: {type: 'float', default: 0.3},
                smoothness: {type: 'float', default: 0.1}
            },
            init: function(data) {
                this.texture = new THREE.VideoTexture(data.src);
                this.texture.minFilter = THREE.LinearFilter;
                this.texture.magFilter = THREE.LinearFilter;
                this.texture.format = THREE.RGBAFormat;
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        texture1: { type: 't', value: this.texture },
                        color: { type: 'c', value: new THREE.Color(data.color) },
                        similarity: { type: 'f', value: data.similarity },
                        smoothness: { type: 'f', value: data.smoothness }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec2 vUv;
                        uniform sampler2D texture1;
                        uniform vec3 color;
                        uniform float similarity;
                        uniform float smoothness;
                        void main() {
                            vec4 videoColor = texture2D(texture1, vUv);
                            float diff1 = distance(videoColor.rgb, color);
                            float alpha = smoothstep(similarity, similarity + smoothness, diff1);
                            gl_FragColor = vec4(videoColor.rgb, videoColor.a * alpha);
                        }
                    `,
                    transparent: true
                });
            },
            update: function(oldData) {
                this.material.uniforms.texture1.value = new THREE.VideoTexture(this.data.src);
            }
        });

        AFRAME.registerComponent('vidhandler', {
            init: function () {
                this.toggle = false;
                this.vid = document.querySelector("#videoPersonaje");
                this.vid.pause();
            },
            tick: function () {
                if (this.el.object3D.visible == true) {
                    if (!this.toggle) {
                        this.toggle = true;
                        this.vid.play();
                    }
                } else {
                    this.toggle = false;
                    this.vid.pause();
                }
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="videoPersonaje" src="download.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker preset="hiro" vidhandler>
            <a-plane 
                material="shader: chromakey; src: #videoPersonaje; color: 0.0 1.0 0.0" 
                position="0 0.5 0" 
                rotation="-90 0 0" 
                width="2" 
                height="2">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
