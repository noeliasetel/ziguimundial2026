<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencia RA - Cigüeña</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; font-size: 18px; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loading-screen">Iniciando cámara y cargando experiencia...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no;" 
             color-space="sRGB" 
             renderer="colorManagement: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="mi-video" src="./Futbol.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#mi-video" width="1" height="0.56" position="0 0 0.1"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const showEntity = document.querySelector('[mindar-image-target]');
      const myVideo = document.querySelector('#mi-video');
      const loadingScreen = document.getElementById('loading-screen');
      const sceneEl = document.querySelector('a-scene');

      // Oculta la pantalla de carga cuando la cámara está lista
      sceneEl.addEventListener("renderstart", () => {
         loadingScreen.style.display = 'none';
      });

      // Reproduce el video cuando detecta la imagen
      showEntity.addEventListener("targetFound", event => {
        myVideo.play().catch(e => console.log(e));
      });

      // Pausa el video cuando se pierde la imagen
      showEntity.addEventListener("targetLost", event => {
        myVideo.pause();
      });
    </script>
</body>
</html>
