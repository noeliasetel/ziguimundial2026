<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cigüeña Realidad Aumentada</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="video-cigueña" src="./Futbol.mp4" autoplay loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

        <a-entity position="0 0 -2.2">

            <a-image src="https://images.unsplash.com/photo-1518604666860-9ed391f76460?auto=format&fit=crop&w=800&q=80" 
                     width="3.2" 
                     height="2.2" 
                     position="0 0 -0.1">
            </a-image>

            <a-video src="#video-cigueña" 
                     material="shader: chromakey; color: 0 255 0; tolerance: 0.3; quality: 0.6;"
                     width="1.8" 
                     height="1.8" 
                     position="0 -0.1 0">
            </a-video>

        </a-entity>

    </a-scene>

</body>
</html>
