<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./porteria.mind; filterMinCF:0.001; filterBeta: 0.01;" 
             color-space="sRGB" 
             renderer="colorManagement: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="mi-video" src="./video.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#mi-video" width="1" height="0.56" position="0 0 0.1" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      // Este script detecta cuando la cámara ve la portería para reproducir el video, 
      // y lo pausa cuando el usuario deja de apuntar a la portería.
      const showEntity = document.querySelector('[mindar-image-target]');
      const myVideo = document.querySelector('#mi-video');

      showEntity.addEventListener("targetFound", event => {
        myVideo.play();
      });

      showEntity.addEventListener("targetLost", event => {
        myVideo.pause();
      });
    </script>
</body>
</html>
