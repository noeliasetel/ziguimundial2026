<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Video</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<!-- VIDEO -->
<video
  id="video"
  src="video.mp4"
  loop
  muted
  playsinline
  webkit-playsinline
  crossorigin="anonymous"
></video>

<a-scene
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js/examples/image-tracking/assets/card-example/card.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
>

  <a-assets>
    <video
      id="vid"
      src="video.mp4"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- VIDEO PLANO -->
    <a-video
      src="#vid"
      position="0 0 0"
      width="1"
      height="1.8"
      transparent="true"
      material="shader: chromakey; src: #vid; color: 0 1 0"
    >
    </a-video>

  </a-entity>

</a-scene>

<script>
AFRAME.registerShader('chromakey', {
  schema: {
    src: {type: 'map'},
    color: {type: 'vec3', default: {x: 0, y: 1, z: 0}}
  },

  init: function(data) {
    this.material = new THREE.ShaderMaterial({
      transparent: true,
      uniforms: {
        map: { value: data.src },
        color: { value: new THREE.Vector3(
          data.color.x,
          data.color.y,
          data.color.z
        )}
      },

      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position = projectionMatrix *
                        modelViewMatrix *
                        vec4(position,1.0);
        }
      `,

      fragmentShader: `
        uniform sampler2D map;
        uniform vec3 color;

        varying vec2 vUv;

        void main() {
          vec4 tColor = texture2D(map, vUv);

          float diff = distance(tColor.rgb, color);

          if(diff < 0.4) discard;

          gl_FragColor = tColor;
        }
      `
    });
  },

  update: function() {},

  tick: function() {},

  remove: function() {},

  pause: function() {},

  play: function() {}
});
</script>

</body>
</html>
